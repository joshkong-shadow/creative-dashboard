name: Refresh Northbeam data

on:
  schedule:
    # 9am / 1pm / 5pm / 11pm MYT (UTC+8) = 01:00 / 05:00 / 09:00 / 15:00 UTC.
    # Offset 2h from the sibling im8-dashboard cron (23/03/07/13 UTC) so the
    # two never race the Meta Marketing API even with GitHub's ~1.5h cron delay.
    - cron: '0 1,5,9,15 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Northbeam data
        env:
          NORTHBEAM_API_KEY: ${{ secrets.NORTHBEAM_API_KEY }}
          NORTHBEAM_CLIENT_ID: ${{ secrets.NORTHBEAM_CLIENT_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: python scripts/fetch_northbeam.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json public/data/history/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh Northbeam $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
